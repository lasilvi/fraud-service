server:
  port: 8080

fraud:
  threshold: 15000

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/frauddb}
    username: ${DB_USERNAME:fraud}
    password: ${DB_PASSWORD:fraud}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    root: INFO
    com.fraud: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
