services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: frauddb
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    ports:
      - "5432:5432"
    networks:
      - fraud-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 5s
      timeout: 5s
      retries: 5

  fraud-service:
    build:
      context: ./backend/transaction-service
      dockerfile: Dockerfile
    container_name: fraud-service
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/frauddb
      - DB_USERNAME=fraud
      - DB_PASSWORD=fraud
      - CONFIG_SERVICE_URL=http://config-service:8081
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    depends_on:
      postgres:
        condition: service_healthy
      config-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - fraud-network

  fraud-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fraud-frontend
    ports:
      - "3000:80"
    depends_on:
      - fraud-service
    networks:
      - fraud-network

  config-service:
    build:
      context: ./backend/config-service
      dockerfile: Dockerfile
    container_name: config-service
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/frauddb
      - DB_USERNAME=fraud
      - DB_PASSWORD=fraud
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraud-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fraud-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - fraud-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  alert-service:
    build:
      context: ./backend/alert-service
      dockerfile: Dockerfile
    container_name: alert-service
    ports:
      - "8082:8082"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - fraud-network

networks:
  fraud-network:
    driver: bridge

volumes:
  postgres_data:
