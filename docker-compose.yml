services:
  fraud-service:
    build:
      context: ./fraud-backend
      dockerfile: Dockerfile
    container_name: fraud-service
    ports:
      - "8080:8080"
    networks:
      - fraud-network

  fraud-frontend:
    build:
      context: ./fraud-frontend
      dockerfile: Dockerfile
    container_name: fraud-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - fraud-service
    networks:
      - fraud-network

networks:
  fraud-network:
    driver: bridge
