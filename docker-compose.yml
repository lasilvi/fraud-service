services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: frauddb
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    ports:
      - "5432:5432"
    networks:
      - fraud-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 5s
      timeout: 5s
      retries: 5

  fraud-service:
    build:
      context: ./fraud-backend
      dockerfile: Dockerfile
    container_name: fraud-service
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/frauddb
      - DB_USERNAME=fraud
      - DB_PASSWORD=fraud
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraud-network

  fraud-frontend:
    build:
      context: ./fraud-frontend
      dockerfile: Dockerfile
    container_name: fraud-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - fraud-service
    networks:
      - fraud-network

networks:
  fraud-network:
    driver: bridge

volumes:
  postgres_data:
