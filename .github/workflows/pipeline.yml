name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - "feature/*"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build transaction-service
        run: mvn -B clean compile -f backend/transaction-service/pom.xml

      - name: Build config-service
        run: mvn -B clean compile -f backend/config-service/pom.xml

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test transaction-service
        run: mvn -B test -f backend/transaction-service/pom.xml

      - name: Test config-service
        run: mvn -B test -f backend/config-service/pom.xml

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package transaction-service
        run: mvn -B clean install -DskipTests -f backend/transaction-service/pom.xml

      - name: Package config-service
        run: mvn -B clean install -DskipTests -f backend/config-service/pom.xml

      - name: Upload transaction-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: transaction-service
          path: backend/transaction-service/target/*.jar

      - name: Upload config-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-service
          path: backend/config-service/target/*.jar
